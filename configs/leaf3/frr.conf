hostname leaf3
!
log stdout
!
interface eth1
 ip address 10.0.5.2/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
!
interface eth2
 ip address 10.0.6.2/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
!
interface lo
 ip address 2.2.2.3/32
 ip ospf area 0.0.0.0
!
interface br10
 bridge vxlan-vni 10010
!
interface vxlan10010
 vxlan source-address 2.2.2.3
 vxlan vni 10010
 bridge-access br10
!
router ospf
 ospf router-id 2.2.2.3
 log-adjacency-changes
!
router bgp 65003
 bgp router-id 2.2.2.3
 no bgp ebgp-requires-policy
 !
 neighbor 10.0.5.1 remote-as 65000
 neighbor 10.0.6.1 remote-as 65000
 !
 address-family ipv4 unicast
  neighbor 10.0.5.1 activate
  neighbor 10.0.6.1 activate
  network 2.2.2.3/32
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 10.0.5.1 activate
  neighbor 10.0.6.1 activate
  advertise-all-vni
 exit-address-family
!
line vty
!
end
